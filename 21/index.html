<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>21 | urerinka</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <div id="game-screen">
      <h1>21</h1>
      <p class="subtext">フェイクチップだけ • あなた vs CPU vs ディーラー</p>

      <div class="top-info">
        <div class="info-box">
          <span class="info-label">あなたのチップ</span>
          <span id="player-bank" class="info-value">1000</span>
        </div>

        <div class="info-box">
          <span class="info-label">ベット</span>
          <input type="number" id="bet-input" min="10" step="10" value="50" />
        </div>
      </div>

      <div class="button-row top-buttons">
        <button id="start-round-btn" class="main-btn">スタート</button>
      </div>

      <div id="status-box">ベットしてスタートしてね。</div>

      <div class="table-area">
        <div class="player-section dealer-section">
          <div class="player-header">
            <div>
              <h2>ディーラー</h2>
              <p>スコア: <span id="dealer-score">0</span></p>
            </div>
          </div>
          <div id="dealer-cards" class="cards-row"></div>
          <div id="dealer-result" class="result-line"></div>
        </div>

        <div class="player-section active-turn" id="player-seat">
          <div class="player-header">
            <div>
              <h2>あなた</h2>
              <p>ベット: <span id="player-bet">0</span></p>
            </div>
            <div class="mini-score">
              <span id="player-score">0</span>
            </div>
          </div>
          <div id="player-cards" class="cards-row"></div>
          <div id="player-result" class="result-line"></div>
        </div>

        <div class="player-section" id="cpu1-seat">
          <div class="player-header">
            <div>
              <h2>CPU</h2>
              <p>ベット: <span id="cpu1-bet">0</span></p>
            </div>
            <div class="mini-score">
              <span id="cpu1-score">0</span>
            </div>
          </div>
          <div id="cpu1-cards" class="cards-row"></div>
          <div id="cpu1-result" class="result-line"></div>
        </div>
      </div>

      <div class="button-row action-buttons">
        <button id="hit-btn" class="main-btn" disabled>ヒット</button>
        <button id="stand-btn" class="main-btn" disabled>スタンド</button>
        <button id="double-btn" class="main-btn" disabled>ダブル</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
