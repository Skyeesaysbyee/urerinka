<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>21 | うれりんか</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="../icon.png">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icon.png">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">

    <!-- LOBBY -->
    <div id="lobby-screen">
      <button class="back-btn" onclick="location.href='/'">← もどる</button>

      <h1>21</h1>
      <p class="subtext">21 ! </p>

      <div class="lobby-box">
        <p class="label-text">名前</p>
        <input type="text" id="username-input" placeholder="なまえ" maxlength="20" />

        <p class="label-text">ルームID</p>
        <input type="text" id="room-id-input" placeholder="ルームコード" maxlength="20" />

        <button id="join-btn" class="main-btn">入る</button>
      </div>

      <div class="info-note">
      </div>
    </div>

    <!-- GAME -->
    <div id="game-screen" style="display: none;">
      <div class="header-top">
        <button class="back-btn" id="leave-btn">← もどる</button>
        <div class="header-center">
          <h1>21</h1>
          <p id="room-display" class="mini-line"></p>
        </div>
        <div class="header-right">
          <span id="turn-display"></span>
        </div>
      </div>

      <div id="waiting-box" class="waiting-box" style="display: none;"></div>

      <div class="top-info">
        <div class="info-box">
          <span class="info-label">あなたのチップ</span>
          <span id="player-bank" class="info-value">1000</span>
        </div>

        <div class="info-box">
          <span class="info-label">ベット</span>
          <input type="number" id="bet-input" min="1" step="1" value="50" />
        </div>
      </div>

      <div class="button-row start-row">
        <button id="start-round-btn" class="main-btn">スタート</button>
      </div>

      <div id="status-box">部屋に入ってスタートしてね。</div>

      <div class="table-area">
        <div class="player-section dealer-section">
          <div class="player-header">
            <div>
              <h2>ディーラー</h2>
              <p>スコア: <span id="dealer-score">0</span></p>
            </div>
          </div>
          <div id="dealer-cards" class="cards-row"></div>
          <div id="dealer-result" class="result-line"></div>
        </div>

        <div class="player-section" id="player-seat">
          <div class="player-header">
            <div>
              <h2>あなた</h2>
              <p>ベット: <span id="player-bet">0</span></p>
            </div>
            <div class="mini-score">
              <span id="player-score">0</span>
            </div>
          </div>
          <div id="player-cards" class="cards-row"></div>
          <div id="player-result" class="result-line"></div>
        </div>

        <div class="player-section" id="opp-seat">
          <div class="player-header">
            <div>
              <h2 id="opp-name">あいて</h2>
              <p>
                ベット: <span id="opp-bet">0</span><br>
                チップ: <span id="opp-bank">0</span>
              </p>
            </div>
            <div class="mini-score">
              <span id="opp-score">0</span>
            </div>
          </div>
          <div id="opp-cards" class="cards-row"></div>
          <div id="opp-result" class="result-line"></div>
        </div>
      </div>

      <div class="button-row action-buttons">
        <button id="hit-btn" class="main-btn" disabled>ヒット</button>
        <button id="stand-btn" class="main-btn" disabled>スタンド</button>
        <button id="double-btn" class="main-btn" disabled>ダブル</button>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over-overlay" style="display: none;">
      <div class="overlay-card">
        <h1 id="game-over-title"></h1>
        <p id="game-over-msg"></p>
        <button id="leave-btn-overlay" class="main-btn" onclick="location.reload()">もどる</button>
      </div>
    </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
