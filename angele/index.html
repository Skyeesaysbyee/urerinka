<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>えらいね</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            background: #111;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.15);
            text-align: center;
            border: 1px solid #222;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .menu-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-align: center;
        }

        .menu-card:not(.locked):hover {
            transform: scale(1.02);
            border-color: #ffb7c5;
        }

        .menu-card.locked {
            opacity: 0.5;
            cursor: default;
            border-style: dashed;
        }

        .menu-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .menu-card h3 {
            margin: 0;
            color: #ffb7c5;
            font-size: 1.2rem;
        }

        .menu-card p {
            margin: 5px 0 0;
            font-size: 0.8em;
            color: #888;
        }

        #start-screen h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        #start-screen p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #ffb7c5;
        }

        .main-btn {
            background-color: #ffb7c5;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .main-btn:hover {
            background-color: #ffc8d2;
            transform: translateY(-2px);
        }

        .main-btn:active {
            transform: translateY(0);
        }

        #leaderboard-area {
            margin-top: 40px;
            text-align: left;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        #leaderboard-area h3 {
            font-size: 1rem;
            color: #ffb7c5;
            margin-bottom: 15px;
            text-align: center;
        }

        #high-scores {
            list-style: none;
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.8;
            padding-left: 0;
        }

        #dice-area {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .dice {
            width: 50px;
            height: 50px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .dice.held {
            border-color: #ffb7c5;
            color: #ffb7c5;
            background: #2a1b1d;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        td, th {
            padding: 8px;
            border-bottom: 1px solid #222;
            font-size: 0.85rem;
        }

        #celeb-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #letter-container {
            text-align: left;
            line-height: 1.8;
            animation: fadeIn 2s ease-in-out;
            padding: 10px;
        }

        .message-body {
            font-size: 1.05rem;
            color: #eee;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }

        .signature {
            text-align: right;
            color: #ffb7c5;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        .heart-divider {
            color: #ffb7c5;
            font-size: 1.5rem;
            margin: 20px 0;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn-container {
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="letter-container">
            <h2 style="color: #ffb7c5; margin-bottom: 20px;">りんかへ、</h2>
            
            <div class="message-body">この一年で、りんかがすごく成長してるのをずっと見てきたよ。
9年生のときに初めて会ったとき、きれいだなって思ったけど、まさかこんなふうに彼女になるなんて想像もしてなかった。

でも今は、毎晩一緒にヤッツィーして、毎日会って、お互いのこといっぱい考えてるね。
ほんとに一緒にいられて幸せだよ。
いつも俺のこと幸せにしてくれてありがとう。

これからもずっと一緒にいようね。
大好きだよ。
これからもヤッツィーいっぱいしようね。

この秘密を見つけたのも、えらいね。誇りだよ。</div>

            <div class="heart-divider"> ♡ </div>
            
            <div class="signature">スカイより</div>

            <div class="back-btn-container">
                <a href="../" class="main-btn" style="text-decoration: none; display: inline-block;">← もどる</a>
            </div>
        </div>
    </div>
</body>
</html>
